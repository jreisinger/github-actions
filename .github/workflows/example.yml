name: test, scan and release

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*"

jobs:
  go-test-scan:
    uses: jreisinger/github-actions/.github/workflows/go-test-scan.yml@main
  go-release:
    needs:
      - go-test-scan
    uses: jreisinger/github-actions/.github/workflows/go-release.yml@main
